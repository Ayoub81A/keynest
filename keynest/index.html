<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeyNest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<!-- ══════════════════════════════════════════
     AUTH SCREEN
═══════════════════════════════════════════ -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <div class="auth-logo-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
          </svg>
        </div>
        <span class="auth-logo-text">Key<span>Nest</span></span>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Register</button>
      </div>
    </div>
    <div class="auth-body">
      <p class="auth-subtitle" id="auth-subtitle">Welcome back. Sign in to access your vault.</p>
      <div class="auth-error" id="auth-error"></div>
      <div class="auth-field">
        <label>Email</label>
        <input id="auth-email" type="email" placeholder="you@example.com"
          onkeydown="if(event.key==='Enter')submitAuth()" />
      </div>
      <div class="auth-field">
        <label>Password</label>
        <div class="auth-pw-wrap">
          <input id="auth-password" type="password" placeholder="Enter your password"
            onkeydown="if(event.key==='Enter')submitAuth()"
            oninput="updateAuthStrength()" />
          <button class="auth-pw-eye" onclick="toggleAuthPw()" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="auth-strength" id="auth-strength-wrap" style="display:none">
          <div class="auth-strength-bar"><div class="auth-strength-fill" id="auth-str-fill"></div></div>
          <span class="auth-strength-label" id="auth-str-label"></span>
        </div>
      </div>
      <button class="auth-btn" id="auth-submit-btn" onclick="submitAuth()">Sign In</button>
    </div>
    <div class="auth-footer">
      Your vault is encrypted locally. Passwords never leave your device unencrypted.
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     VAULT SHELL
═══════════════════════════════════════════ -->
<div id="vault-shell" class="shell hidden">

  <header>
    <a href="../keynest-site/index.html" class="logo" style="text-decoration:none" title="Back to site">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
        </svg>
      </div>
      <span class="logo-text">Key<span>Nest</span></span>
    <div class="header-right">
      <div class="avatar" id="user-avatar" title=""></div>
      <button class="btn-logout" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Sign Out</span>
      </button>
    </a>
  </header>

  <div class="body-grid">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main">
      <div class="stats" id="stats"></div>
      <div class="toolbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search" placeholder="Search…" oninput="renderMain()" />
        </div>
      </div>
      <div id="main-content"></div>
    </div>
  </div>

</div>


<!-- FAB -->
<button class="fab" id="fab" onclick="openModal('password')" title="New Entry" style="display:none">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
</button>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">New Entry</span>
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirm-title">Move to trash?</div>
    <div class="confirm-body" id="confirm-body"></div>
    <div class="confirm-actions">
      <button class="btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn-danger" id="confirm-action-btn" onclick="confirmAction()">Move to Trash</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Scripts — order matters -->
<script src="assets/crypto.js"></script>
<script src="assets/api.js"></script>
<script src="assets/app.js"></script>

</body>
</html>
